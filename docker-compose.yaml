services:
  server:
    build:
      context: ./server
    ports:
      - "3010:3010"
    volumes:
      - ./server:/app
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
